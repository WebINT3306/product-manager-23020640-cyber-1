<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 25px;
      background-color: #eef2f5; 
      color: #222;
    }

    #product-table {
      width: 100%;
      border-collapse: collapse;
      background-color: #ffffff;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }

    #product-table th, #product-table td {
      padding: 12px;
      border: 1px solid #dcdcdc;
      text-align: center;
    }

    #product-table th {
      cursor: pointer;
      background-color: #e4e8ec;
      font-weight: 600;
    }

    #product-table tbody tr:nth-child(even) {
      background-color: #f7f9fc;
    }

    #product-table tbody tr:hover {
      background-color: #d1e7dd;
    }

    .form-wrapper {
      margin-top: 25px;
      background-color: #ffffff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }

    .form-wrapper input {
      margin: 5px 10px 5px 0;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }

    button#btn-add {
      padding: 8px 15px;
      cursor: pointer;
      background-color: #0d6efd;
      color: white;
      border: none;
      border-radius: 3px;
    }
    
    button#btn-add:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>

<body>

<h2>Danh sách sản phẩm</h2>

<table id="product-table">
  <thead>
    <tr>
      <th>STT</th>
      <th id="th-sort-name">Tên sản phẩm <span id="sort-indicator"></span></th>
      <th>Danh mục</th>
      <th>Đơn giá</th>
      <th>Số lượng</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="form-wrapper">
  <h3>Thêm sản phẩm mới</h3>
  <input type="text" id="input-name" placeholder="Tên sản phẩm">
  <input type="text" id="input-category" placeholder="Danh mục">
  <input type="number" id="input-price" placeholder="Đơn giá">
  <input type="number" id="input-quantity" placeholder="Số lượng">
  <button id="btn-add">Thêm vào bảng</button>
</div>

<script>
let dataStore = [];
let isAscending = true;

function updateTableUI() {
  const tableBody = document.querySelector("#product-table tbody");
  tableBody.innerHTML = "";

  let currentIndex = 1;
  for (let item of dataStore) {
    const newRow = document.createElement("tr");

    newRow.innerHTML = `
      <td>${currentIndex++}</td>
      <td>${item.name}</td>
      <td>${item.category || ""}</td>
      <td>${item.price}</td>
      <td>${item.quantity}</td>
    `;

    tableBody.appendChild(newRow);
  }
}

const ajaxReq = new XMLHttpRequest();
ajaxReq.onreadystatechange = function() {
  if (ajaxReq.readyState === 4 && ajaxReq.status === 200) {
    dataStore = JSON.parse(ajaxReq.responseText);
    updateTableUI();
  }
};
ajaxReq.open("GET", "products.json");
ajaxReq.send();

const headerName = document.getElementById("th-sort-name");
const indicator = document.getElementById("sort-indicator");

headerName.addEventListener("click", function() {
  dataStore.sort((objA, objB) => {
    return isAscending 
      ? objA.name.localeCompare(objB.name) 
      : objB.name.localeCompare(objA.name);
  });

  isAscending = !isAscending;
  indicator.textContent = isAscending ? "▲" : "▼";

  updateTableUI();
});

function handleAddNewProduct() {
  const valName = document.getElementById("input-name").value.trim();
  const valCategory = document.getElementById("input-category").value.trim();
  const valPrice = parseFloat(document.getElementById("input-price").value);
  const valQuantity = parseInt(document.getElementById("input-quantity").value);

  if (valName.length < 3) {
    alert("Tên sản phẩm phải từ 3 ký tự!");
    return;
  }
  if (isNaN(valPrice) || valPrice <= 0) {
    alert("Giá phải là số dương!");
    return;
  }
  if (isNaN(valQuantity) || valQuantity < 1) {
    alert("Số lượng phải từ 1 trở lên!");
    return;
  }

  const record = {
    id: Date.now(),
    name: valName,
    category: valCategory,
    price: valPrice,
    quantity: valQuantity
  };

  dataStore.push(record);
  updateTableUI();

  document.getElementById("input-name").value = "";
  document.getElementById("input-category").value = "";
  document.getElementById("input-price").value = "";
  document.getElementById("input-quantity").value = "";
}

document.getElementById("btn-add").addEventListener("click", handleAddNewProduct);
</script>

</body>
</html>
